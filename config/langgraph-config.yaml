# Quinn QA Engineer — LangGraph agent configuration

model:
  provider: openai
  name: protolabs/quinn
  api_base: http://gateway:4000/v1
  api_key: ""  # falls back to OPENAI_API_KEY env (= LITELLM_MASTER_KEY from Infisical)
  temperature: 0.2
  max_tokens: 4096
  max_iterations: 75

subagents:
  auditor:
    enabled: true
    tools: [board_monitor, pr_inspector, github_issues, github_actions]
    max_turns: 40
  verifier:
    enabled: true
    tools: [qa_memory, browser]
    max_turns: 30
  reporter:
    enabled: true
    tools: [qa_memory, discord_feed, release_notes, file_bug]
    max_turns: 20

middleware:
  knowledge: true
  audit: true
  memory: true

knowledge:
  db_path: /sandbox/knowledge/qa.db
  embed_model: nomic-embed-text
  top_k: 5
