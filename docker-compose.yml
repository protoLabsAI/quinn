services:
  quinn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quinn
    hostname: sandbox

    # Security hardening
    security_opt:
      - no-new-privileges:true
      - seccomp=seccomp-profile.json
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    read_only: true

    # Writable mounts (tmpfs = ephemeral)
    tmpfs:
      - /tmp:size=512M,uid=1001,gid=1001
      - /run:size=64M
      - /sandbox:size=512M,uid=1001,gid=1001
      - /home/sandbox:size=128M,uid=1001,gid=1001

    # Persistent volumes
    volumes:
      - quinn-knowledge:/sandbox/knowledge
      - quinn-audit:/sandbox/audit
      - quinn-cliproxy:/opt/.cliproxy
      # Claude OAuth credentials (read-only)
      - ${HOME}/.claude:/opt/claude-creds:ro

    ports:
      - "7873:7870"

    # Network: host protoLabs Studio + Ollama access
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          memory: 512M

    # Secrets injected by `infisical run` wrapping docker compose.
    # Usage: infisical run --env prod -- docker compose up
    # All 24 secrets from Infisical are passed through as env vars.
    environment:
      - HOME=/home/sandbox
      # These are populated by infisical run on the host
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DISCORD_BOT_QUINN=${DISCORD_BOT_QUINN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_QUINN:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-1070606339363049492}
      # protoLabs Studio API
      - PROTOLABS_SERVER_URL=${PROTOLABS_SERVER_URL:-http://host.docker.internal:3008}
      - PROTOLABS_API_KEY=${PROTOLABS_API_KEY:-}
      # Langfuse tracing (optional)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://host.docker.internal:3001}

    stdin_open: true
    tty: true

    command: ["/opt/quinn/entrypoint.sh"]

volumes:
  quinn-knowledge:
  quinn-audit:
  quinn-cliproxy:
